<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width initial-scale=1">
    <link rel="stylesheet" href ="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../node_modules/bootstrap-icons/font/bootstrap-icons.min.css">
    <style>
      * {
        overflow; hidden;
        margin: 0;
        padding: 0;
        user-select: none;
        text-align: center;
      }

      body {
        width: 100vw;
        height: 100vh;
        background-color: transparent;
      }

      #wrapper {
        overflow: hidden;
        height: 100%;
        background-color: white;
        border-radius: 2vw;
      }

      .centerdiv {
        overflow: hidden;
        display: grid;
        width: 100%;
        align-content: center;
      }

      .progress {
        width: 80vw;
        height: 6vh;
        position: fixed;
        left: 10vw;
        top: 47vh;
        margin-bottom: 1em;
        z-index: 5;
      }

      .logo{
        display: inline-block;
        font-size: 1em;
        z-index: 0;
        color: rgba(0, 0, 0, 1);
      }

      p {
        margin-top: -0.75em;
      }
    </style>
  </head>
  <body>
    <div id="wrapper" class="centerdiv">
      <div>
        <div style="position: fixed; height: 45vh; top: 0;" class="centerdiv">
          <h1 style="font-size: 25vh;"><strong class="lang branding-continuity"></strong></h1>
        </div>
        <div class="progress" role="progressbar" aria-label="Loading Progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%;"></div>
        </div>
        <div style="position: fixed; height: 45vh; top:55vh;" class="centerdiv">
          <h4 id="information">
            <i id="metronome" class='bi bi-arrow-up-circle-fill'></i>
            <span id='descriptor' class="lang load-loading"></span><span class="lang load-pointer"></span> <span id="title" class="lang load-awaitingDisplayInformation"></span>
          </h4>
          <p id="subtitle">&nbsp;</p>
        </div>
      </div>
    </div>
    <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../node_modules/jquery/dist/jquery.js"></script>
    <script type="module" src="loading.js"></script>
    <script>
      function calculatePercentage(progress) {
        let now = parseInt(progress.attr('aria-valuenow'));
        let min = parseInt(progress.attr('aria-valuemin'));
        let max = parseInt(progress.attr('aria-valuemax'));

        now -= min;
        max -= min;

        return (now/max)*100;
      }

      setInterval(() => {
        $('.progress').each(function (index){
          let parent = $(this);
          let child = $(parent.children()[0]);
          child.attr('style', `width: ${calculatePercentage(parent)}%;`);
        });
      }, 1);
    </script>
  </body>
</html>
