<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width initial-scale=1">
    <link rel="stylesheet" href ="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../node_modules/bootstrap-icons/font/bootstrap-icons.min.css">
    <style>
      * {
        overflow; hidden;
        margin: 0;
        padding: 0;
        user-select: none;
        text-align: center;
      }

      body {
        width: 100vw;
        height: 100vh;
        background-color: transparent;
      }

      #wrapper {
        overflow: hidden;
        display: grid;
        width: 100%;
        height: 100%;
        align-content: center;
        background-color: white;
        border-radius: 2vw;
      }

      h1 {
        text-align: center;
      }

      .progress {
        width: 80vw;
        margin-left: 10vw;
      }

      .logo{
        display: inline-block;
        font-size: 1em;
        z-index: 0;
        color: rgba(0, 0, 0, 1);
      }

      p {
        margin-top: -0.75em;
      }
    </style>
  </head>
  <body>
    <script src="loading.js"></script>
    <div id="wrapper">
      <div>
        <h1><strong>CONTINUITY</strong></h1>
        <div class="progress" role="progressbar" aria-label="Loading Progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%;"></div>
        </div>
        <h4><span id="metronome"></span> Loading: <span id="title"></span></h4>
        <p id="subtitle">&nbsp;</p>
      </div>
    </div>
    <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function calculatePercentage(progress) {
        let now = parseInt(progress.attr('aria-valuenow'));
        let min = parseInt(progress.attr('aria-valuemin'));
        let max = parseInt(progress.attr('aria-valuemax'));

        now -= min;
        max -= min;

        return (now/max)*100;
      }

      setInterval(() => {
        $('.progress').each(function (index){
          let parent = $(this);
          let child = $(parent.children()[0]);
          child.attr('style', `width: ${calculatePercentage(parent)}%;`);
        });
      }, 1);
    </script>
  </body>
</html>
